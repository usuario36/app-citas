<ion-header>
  <ion-toolbar>
    <ion-title>Mis Avisos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item *ngFor="let aviso of avisos">
      
      <!-- Foto del aviso -->
      <ion-img *ngIf="aviso.foto" [src]="aviso.foto" style="width: 60px; height: 60px; margin-right: 15px; border-radius: 4px;"></ion-img>
      
      <!-- Información del aviso -->
      <ion-label>
        <h2>{{ aviso.titulo }}</h2>
        <p>{{ aviso.descripcion }}</p>
        
        <!-- Fecha formateada con el Pipe 'date' -->
        <p>
          <small>Creado el: {{ aviso.fecha | date:'dd/MM/yyyy' }}</small>
        </p>
      </ion-label>

      <!-- Botones de Acción -->
      <ion-button slot="end" color="warning" (click)="editar(aviso)">
        <ion-icon name="create"></ion-icon>
      </ion-button>
      
      <ion-button slot="end" color="danger" (click)="eliminar(aviso)">
        <ion-icon name="trash"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <!-- Botón flotante para crear nuevo -->
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button routerLink="/crear-aviso">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
